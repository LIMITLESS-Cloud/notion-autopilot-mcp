[project]
name = "notion-autopilot-mcp"
version = "1.0.0"
description = "Smart Notion task management MCP server — daily standups, overdue alerts, session summaries, bulk status updates, and priority sorting for AI assistants."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Patrick Suen", email = "hello@limitless-automation.com"}
]
keywords = ["mcp", "notion", "tasks", "productivity", "standup", "project-management", "ai-assistant"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Office/Business :: Scheduling",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "mcp[cli]>=1.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/limitless-automation/notion-autopilot-mcp"
Issues = "https://github.com/limitless-automation/notion-autopilot-mcp/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
